<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RAG Chatbot — Ask your documents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     Flat theme — one background, one accent.
     No gradients. No glassmorphism. No backdrop-filter.
     ========================================================= */
  :root{
    --bg:          #0F0F12;
    --surface:     #16161B;
    --surface-2:   #1B1B22;
    --border:      #262630;
    --border-hi:   #3A3A46;
    --ink:         #ECECF1;
    --ink-dim:     #9A9AA6;
    --ink-mute:    #6A6A76;
    --accent:      #7C5CFC;
    --danger:      #E05858;
    --radius:      10px;
    --radius-lg:   16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--ink);
    letter-spacing:-0.01em;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:var(--accent)}

  /* ---------- layout ---------- */
  .page{
    min-height:100vh;display:flex;flex-direction:column;
    position:relative;
  }

  /* ---------- top bar ---------- */
  .top{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 28px;border-bottom:1px solid var(--border);
    background:var(--bg);
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px;letter-spacing:-0.01em}
  .brand-mark{
    width:28px;height:28px;border-radius:8px;background:var(--accent);
    display:grid;place-items:center;color:#fff;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;
  }
  .top-actions{display:flex;align-items:center;gap:8px}
  .top-link{
    font-size:12px;color:var(--ink-dim);text-decoration:none;padding:7px 12px;
    border-radius:8px;transition:color .15s, background .15s;
  }
  .top-link:hover{color:var(--ink);background:var(--surface)}

  /* ---------- hero / landing ---------- */
  .hero{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:48px 24px 80px;
  }
  .announcement{
    display:inline-flex;align-items:center;gap:8px;
    padding:8px 16px;margin-bottom:56px;
    border:1px solid var(--border);background:var(--surface);
    border-radius:999px;font-size:12px;color:var(--ink-dim);
    text-decoration:none;transition:border-color .15s, color .15s;
  }
  .announcement:hover{border-color:var(--accent);color:var(--ink)}
  .announcement .spark{width:14px;height:14px;display:grid;place-items:center;color:var(--accent)}

  h1.title{
    font-size:clamp(2.2rem, 5vw, 3.5rem);font-weight:700;letter-spacing:-0.03em;
    line-height:1.1;text-align:center;margin-bottom:14px;
  }
  h1.title em{color:var(--accent);font-style:italic;font-weight:700}
  p.subtitle{
    font-size:1rem;color:var(--ink-dim);text-align:center;margin-bottom:36px;
    max-width:540px;
  }

  /* ---------- chat input panel ---------- */
  .input-wrap{width:100%;max-width:700px}
  .input-box{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-lg);padding:4px;
    transition:border-color .15s;
  }
  .input-box:focus-within{border-color:var(--accent)}
  textarea.chat{
    width:100%;background:transparent;border:none;outline:none;resize:none;
    color:var(--ink);font-family:inherit;font-size:15px;
    padding:18px 18px 8px;min-height:72px;max-height:220px;line-height:1.5;
  }
  textarea.chat::placeholder{color:var(--ink-mute)}
  .input-bar{
    display:flex;align-items:center;gap:8px;padding:6px 8px 8px;flex-wrap:wrap;
  }
  .icon-btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    padding:8px 10px;border-radius:8px;
    background:transparent;border:1px solid transparent;
    color:var(--ink-dim);font-size:13px;cursor:pointer;
    transition:background .15s, color .15s, border-color .15s;
  }
  .icon-btn:hover{background:var(--surface-2);color:var(--ink)}
  .icon-btn svg{width:16px;height:16px;stroke-width:2}
  .input-spacer{flex:1}
  .send-btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:9px 16px;border-radius:999px;background:var(--accent);color:#fff;
    font-size:13px;font-weight:600;border:none;cursor:pointer;
    transition:filter .15s;
  }
  .send-btn:hover{filter:brightness(1.1)}
  .send-btn:disabled{opacity:.4;cursor:not-allowed;filter:none}
  .send-btn svg{width:16px;height:16px}

  /* ---------- pop menu ---------- */
  .menu-wrap{position:relative}
  .menu{
    position:absolute;bottom:calc(100% + 6px);left:0;
    min-width:220px;
    background:var(--surface-2);border:1px solid var(--border);
    border-radius:var(--radius);padding:6px;z-index:40;
    box-shadow:0 8px 24px rgba(0,0,0,.5);
  }
  .menu-header{
    padding:8px 10px 6px;font-size:10px;letter-spacing:0.12em;
    text-transform:uppercase;color:var(--ink-mute);
  }
  .menu-item{
    display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;
    border-radius:8px;background:transparent;border:none;text-align:left;cursor:pointer;
    color:var(--ink-dim);font-size:13px;transition:background .15s, color .15s;
  }
  .menu-item:hover{background:var(--surface);color:var(--ink)}
  .menu-item svg{width:16px;height:16px;stroke-width:2;color:var(--accent)}
  .menu-item.active{background:var(--surface);color:var(--ink)}

  /* ---------- import buttons ---------- */
  .import-row{
    margin-top:24px;display:flex;align-items:center;gap:14px;justify-content:center;flex-wrap:wrap;
  }
  .import-row span{font-size:13px;color:var(--ink-mute)}
  .import-btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:7px 12px;border-radius:999px;
    border:1px solid var(--border);background:var(--bg);
    color:var(--ink-dim);font-size:12px;cursor:pointer;
    text-decoration:none;transition:border-color .15s, color .15s;
  }
  .import-btn:hover{border-color:var(--accent);color:var(--ink)}
  .import-btn svg{width:14px;height:14px}

  /* ---------- doc stats ---------- */
  .stats-row{
    margin-top:36px;display:flex;align-items:center;gap:8px;
    font-size:12px;color:var(--ink-mute);
  }
  .stats-row strong{color:var(--ink);font-weight:600}
  .stats-row .sep{color:var(--border-hi)}

  /* ---------- conversation view ---------- */
  .conversation{
    display:none;flex:1;flex-direction:column;
    max-width:820px;width:100%;margin:0 auto;padding:24px;
    gap:18px;overflow-y:auto;
  }
  .conversation.active{display:flex}
  .msg{
    display:flex;flex-direction:column;gap:8px;
    padding:18px 20px;border-radius:var(--radius);
    border:1px solid var(--border);background:var(--surface);
  }
  .msg.user{background:var(--bg);border-color:var(--border-hi)}
  .msg-role{
    font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-mute);
  }
  .msg.user .msg-role{color:var(--accent)}
  .msg-body{font-size:14px;line-height:1.7;color:var(--ink);white-space:pre-wrap}
  .sources{margin-top:6px;display:flex;flex-direction:column;gap:8px}
  .src{
    padding:10px 12px;border:1px solid var(--border);border-radius:8px;
    background:var(--bg);font-size:12px;color:var(--ink-dim);
  }
  .src-head{
    display:flex;justify-content:space-between;gap:8px;margin-bottom:6px;
    font-size:11px;color:var(--ink-mute);
  }
  .src-head strong{color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:600}
  .src-body{line-height:1.55;color:var(--ink)}

  /* ---------- sticky chat bar in conversation mode ---------- */
  .composer-sticky{
    border-top:1px solid var(--border);background:var(--bg);
    padding:16px 24px;
  }
  .composer-sticky .input-wrap{margin:0 auto}

  /* ---------- toast ---------- */
  .toast{
    position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
    padding:12px 18px;border:1px solid var(--border);background:var(--surface);
    border-radius:var(--radius);color:var(--ink);font-size:13px;z-index:100;
    opacity:0;pointer-events:none;transition:opacity .2s;
  }
  .toast.show{opacity:1}
  .toast.error{border-color:var(--danger);color:var(--danger)}
  .toast.success{border-color:var(--accent);color:var(--accent)}

  /* ---------- typing dots ---------- */
  .typing{display:inline-flex;gap:4px;align-items:center}
  .typing span{
    width:6px;height:6px;border-radius:50%;background:var(--ink-mute);
    animation:blink 1.2s infinite both;
  }
  .typing span:nth-child(2){animation-delay:.15s}
  .typing span:nth-child(3){animation-delay:.3s}
  @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

  /* ---------- hidden ---------- */
  [hidden]{display:none !important}

  @media (max-width:640px){
    .top{padding:14px 18px}
    .hero{padding:32px 18px 60px}
    .announcement{margin-bottom:40px}
    .import-row{gap:8px}
  }
</style>
</head>
<body>
<div class="page" id="page">

  <!-- ====== TOP BAR ====== -->
  <header class="top">
    <div class="brand">
      <div class="brand-mark">R</div>
      <span>RAG Chatbot</span>
    </div>
    <div class="top-actions">
      <a class="top-link" href="/docs" target="_blank" rel="noopener">API</a>
      <a class="top-link" href="https://github.com/kelvinasiedu-programmer/rag-chatbot" target="_blank" rel="noopener">GitHub</a>
      <button class="top-link" id="btn-new" title="Start a new conversation">New chat</button>
    </div>
  </header>

  <!-- ====== LANDING HERO ====== -->
  <section class="hero" id="hero">

    <!-- announcement pill -->
    <a class="announcement" href="https://github.com/kelvinasiedu-programmer/rag-chatbot" target="_blank" rel="noopener">
      <span class="spark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8Z"/></svg>
      </span>
      Introducing RAG Chatbot v1
    </a>

    <h1 class="title">What would you like to <em>know</em> today?</h1>
    <p class="subtitle">Upload a PDF and ask grounded questions. Answers cite the source pages they came from.</p>

    <!-- chat input -->
    <div class="input-wrap">
      <div class="input-box">
        <textarea id="input" class="chat" placeholder="Ask anything about your documents…" rows="2"></textarea>
        <div class="input-bar">

          <!-- attach (PDF upload) -->
          <div class="menu-wrap" id="attach-wrap">
            <button class="icon-btn" id="btn-attach" title="Attach" aria-haspopup="menu" aria-expanded="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            </button>
            <div class="menu" id="attach-menu" hidden>
              <div class="menu-header">Add context</div>
              <button class="menu-item" id="mi-upload">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg>
                Upload PDF
              </button>
              <button class="menu-item" id="mi-clear">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
                Clear all documents
              </button>
            </div>
            <input type="file" id="file-input" accept="application/pdf" hidden />
          </div>

          <!-- model / mode pill (static: flan-t5-small) -->
          <div class="menu-wrap" id="model-wrap">
            <button class="icon-btn" id="btn-model" aria-haspopup="menu" aria-expanded="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
              <span id="model-label">flan-t5-small</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </button>
            <div class="menu" id="model-menu" hidden>
              <div class="menu-header">Model</div>
              <button class="menu-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8Z"/></svg>
                <div style="flex:1">
                  <div style="color:var(--ink);font-weight:500">flan-t5-small</div>
                  <div style="font-size:11px;color:var(--ink-mute)">Fast · ~300MB · pre-loaded</div>
                </div>
              </button>
            </div>
          </div>

          <div class="input-spacer"></div>

          <button class="icon-btn" id="btn-plan" title="Plan mode (hint)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2Z"/></svg>
            <span style="display:none" class="hide-sm-no">Plan</span>
          </button>

          <button class="send-btn" id="btn-send" disabled>
            <span>Ask</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>

      <div class="import-row">
        <span>or import from</span>
        <button class="import-btn" id="quick-upload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          PDF
        </button>
        <a class="import-btn" href="https://github.com/kelvinasiedu-programmer/rag-chatbot" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
          GitHub
        </a>
      </div>

      <div class="stats-row" id="stats-row">
        <span>Loaded:</span> <strong id="s-docs">0</strong> chunks indexed
      </div>
    </div>
  </section>

  <!-- ====== CONVERSATION ====== -->
  <section class="conversation" id="conv"></section>

  <!-- ====== STICKY COMPOSER (conversation mode) ====== -->
  <div class="composer-sticky" id="composer-sticky" hidden>
    <div class="input-wrap">
      <div class="input-box">
        <textarea id="input-sticky" class="chat" placeholder="Follow up…" rows="1"></textarea>
        <div class="input-bar">
          <button class="icon-btn" id="btn-attach2" title="Attach">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          </button>
          <div class="input-spacer"></div>
          <button class="send-btn" id="btn-send-sticky" disabled>
            <span>Ask</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api/v1';
const $  = (s)=>document.querySelector(s);
const $$ = (s)=>document.querySelectorAll(s);

// ---------- helpers ----------
function toast(msg, type=''){
  const t = $('#toast');
  t.className = 'toast show ' + type;
  t.textContent = msg;
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>{ t.className='toast'; }, 2800);
}
async function api(path, opts={}){
  const r = await fetch(API+path, opts);
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.detail || 'Request failed');
  return data;
}
function autosize(el){
  el.style.height='auto';
  el.style.height = Math.min(el.scrollHeight, 220) + 'px';
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- state ----------
let inConversation = false;

// ---------- menus ----------
function bindMenu(btnId, menuId){
  const btn  = document.getElementById(btnId);
  const menu = document.getElementById(menuId);
  btn.addEventListener('click', (e)=>{
    e.stopPropagation();
    const open = !menu.hasAttribute('hidden');
    // close all menus
    $$('.menu').forEach(m=>m.setAttribute('hidden',''));
    if(!open){ menu.removeAttribute('hidden'); btn.setAttribute('aria-expanded','true'); }
    else     { btn.setAttribute('aria-expanded','false'); }
  });
}
bindMenu('btn-attach','attach-menu');
bindMenu('btn-model','model-menu');
document.addEventListener('click', ()=> $$('.menu').forEach(m=>m.setAttribute('hidden','')));

// ---------- upload ----------
async function uploadPDF(file){
  if(!file) return;
  if(!file.name.toLowerCase().endsWith('.pdf')){ toast('Only PDF files supported','error'); return; }
  toast('Uploading & indexing…');
  const fd = new FormData();
  fd.append('file', file);
  try{
    const r = await fetch(API+'/documents/upload',{method:'POST', body:fd});
    const data = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(data.detail || 'Upload failed');
    toast(`Indexed ${data.chunks_added||'?'} chunks from ${file.name}`,'success');
    loadStats();
  }catch(e){ toast(e.message,'error'); }
}
$('#file-input').addEventListener('change', e=> uploadPDF(e.target.files[0]));
$('#mi-upload').addEventListener('click', ()=> $('#file-input').click());
$('#quick-upload').addEventListener('click', ()=> $('#file-input').click());

$('#mi-clear').addEventListener('click', async ()=>{
  if(!confirm('Clear all indexed documents?')) return;
  try{ await api('/documents',{method:'DELETE'}); toast('All documents cleared','success'); loadStats(); }
  catch(e){ toast(e.message,'error'); }
});

// ---------- stats ----------
async function loadStats(){
  try{
    const r = await api('/documents');
    $('#s-docs').textContent = r.total_documents ?? 0;
  }catch(e){ /* silent */ }
}
loadStats();

// ---------- conversation ----------
function enterConversation(){
  if(inConversation) return;
  inConversation = true;
  $('#hero').style.display = 'none';
  $('#conv').classList.add('active');
  $('#composer-sticky').removeAttribute('hidden');
}
function resetConversation(){
  inConversation = false;
  $('#conv').innerHTML = '';
  $('#conv').classList.remove('active');
  $('#hero').style.display = '';
  $('#composer-sticky').setAttribute('hidden','');
  $('#input').value=''; autosize($('#input'));
  $('#btn-send').disabled = true;
}
$('#btn-new').addEventListener('click', resetConversation);

function renderUser(text){
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `<div class="msg-role">You</div><div class="msg-body">${escapeHtml(text)}</div>`;
  $('#conv').appendChild(el);
  $('#conv').scrollTop = $('#conv').scrollHeight;
}
function renderAssistantPending(){
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML = `<div class="msg-role">Assistant</div>
    <div class="msg-body"><span class="typing"><span></span><span></span><span></span></span></div>`;
  $('#conv').appendChild(el);
  $('#conv').scrollTop = $('#conv').scrollHeight;
  return el;
}
function renderSources(sources){
  if(!sources || !sources.length) return '';
  return `<div class="sources">${sources.map((s,i)=>`
    <div class="src">
      <div class="src-head">
        <strong>Source ${i+1}</strong>
        <span>${s.metadata?.source || ''}${s.metadata?.page?' · p.'+s.metadata.page:''} · score ${s.score?.toFixed(3) ?? ''}</span>
      </div>
      <div class="src-body">${escapeHtml(s.text || '').slice(0,420)}${(s.text||'').length>420?'…':''}</div>
    </div>
  `).join('')}</div>`;
}

async function ask(question){
  if(!question.trim()) return;
  enterConversation();
  renderUser(question);
  const pending = renderAssistantPending();
  try{
    const r = await fetch(API+'/query',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question})
    });
    const data = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(data.detail || 'Query failed');
    pending.innerHTML = `<div class="msg-role">Assistant</div>
      <div class="msg-body">${escapeHtml(data.answer || '(no answer)')}</div>
      ${renderSources(data.sources)}`;
    $('#conv').scrollTop = $('#conv').scrollHeight;
  }catch(e){
    pending.innerHTML = `<div class="msg-role" style="color:var(--danger)">Error</div>
      <div class="msg-body">${escapeHtml(e.message)}</div>`;
  }
}

// ---------- input wiring ----------
function wireInput(textareaId, sendBtnId){
  const t = document.getElementById(textareaId);
  const b = document.getElementById(sendBtnId);
  t.addEventListener('input', ()=>{
    autosize(t);
    b.disabled = !t.value.trim();
  });
  t.addEventListener('keydown', (e)=>{
    if(e.key==='Enter' && !e.shiftKey){
      e.preventDefault();
      if(!b.disabled){ b.click(); }
    }
  });
  b.addEventListener('click', ()=>{
    const q = t.value.trim();
    if(!q) return;
    ask(q);
    t.value=''; autosize(t); b.disabled=true;
  });
}
wireInput('input','btn-send');
wireInput('input-sticky','btn-send-sticky');

// attach button in sticky composer just opens file picker
$('#btn-attach2').addEventListener('click', ()=> $('#file-input').click());

['dragover','drop'].forEach(ev=>document.addEventListener(ev, e=>e.preventDefault()));
document.addEventListener('drop', e=>{
  if(e.dataTransfer?.files?.length) uploadPDF(e.dataTransfer.files[0]);
});
